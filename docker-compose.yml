services:
  scheduler:
    build: .
    restart: unless-stopped
    # все переменные из .env (CRYPTOBOT_TOKEN, TZ, SECRET_KEY и т.п.) — внутрь контейнера
    env_file:
      - .env
    environment:
      # Часовой пояс для расписаний (иначе UTC). Пример: Europe/Moscow, Asia/Almaty
      TZ: ${TZ:-UTC}
      # Стартовый вход администратора. Пока владелец не задал свой логин/пароль,
      # при запуске админ-вход приводится к этим значениям (admin/admin по умолчанию,
      # СЛАБО!) — так можно войти, даже если пароль забыт. Задай свои в .env.
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
      # «Аварийный сброс»: смени это число (2, 3, …) и перезапусти контейнер, чтобы
      # ПРИНУДИТЕЛЬНО вернуть вход admin/admin, даже если свой пароль уже задан и забыт.
      # Данные (профили/расписания) сохраняются — сбрасываются только логин/пароль.
      ADMIN_RESET_TOKEN: ${ADMIN_RESET_TOKEN:-1}
    volumes:
      # профили, расписания, пользователи, ключ подписи — переживают перезапуски
      - ./profiles:/app/profiles

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # домен панели (берётся из .env), на него Caddy получит HTTPS-сертификат
      PANEL_DOMAIN: ${PANEL_DOMAIN:?Задай PANEL_DOMAIN в .env}
      # домен Vita (~/vita); по умолчанию — авто-домен sslip.io, свой задаётся в .env
      VITA_DOMAIN: ${VITA_DOMAIN:-vita.138-124-51-182.sslip.io}
    extra_hosts:
      # мост к контейнеру Vita, опубликованному на 127.0.0.1:8788 хоста
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
