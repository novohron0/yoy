services:
  scheduler:
    build: .
    restart: unless-stopped
    environment:
      # Часовой пояс для расписаний (иначе UTC). Пример: Europe/Moscow, Asia/Almaty
      TZ: ${TZ:-UTC}
      # SECRET_KEY можно не задавать — сгенерируется и сохранится в
      # profiles/secret.key (тогда сессии входа переживают перезапуск).
    volumes:
      # профили, расписания, пользователи, ключ подписи — переживают перезапуски
      - ./profiles:/app/profiles

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # домен панели (берётся из .env), на него Caddy получит HTTPS-сертификат
      PANEL_DOMAIN: ${PANEL_DOMAIN:?Задай PANEL_DOMAIN в .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
